<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/icons/icon-48x48.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512x512.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Family Recipes for sharing recipes and shopping lists with your family.">
    <meta name="theme-color" content="#f8f8f6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500&display=swap" rel="stylesheet">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Family Recipes">
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/icon-76x76.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/icons/icon-60x60.png">
    <!-- Load manifest asynchronously to avoid blocking critical path (1,356ms delay) -->
    <script>
      // Load manifest asynchronously after page load to avoid blocking critical path
      if ('serviceWorker' in navigator || 'standalone' in window.navigator) {
        const link = document.createElement('link')
        link.rel = 'manifest'
        link.href = '/manifest.webmanifest'
        // Load after DOMContentLoaded to avoid blocking initial render
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', () => {
            document.head.appendChild(link)
          })
        } else {
          document.head.appendChild(link)
        }
      }
    </script>
    <!-- Preconnect to Google Fonts for better performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Ensure font-display: swap for Google Fonts (2025 best practice) -->
    <script>
      // Ensure display=swap for Google Fonts to improve FCP and prevent invisible text
      // This handles both static and dynamically loaded fonts
      (function() {
        function ensureDisplaySwap(link) {
          if (link.href && link.href.includes('fonts.googleapis.com/css') && !link.href.includes('display=')) {
            try {
              const url = new URL(link.href)
              url.searchParams.set('display', 'swap')
              link.href = url.toString()
            } catch (e) {
              // Ignore invalid URLs
            }
          }
        }
        
        // Check existing links on DOMContentLoaded
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('link[href*="fonts.googleapis.com/css"]').forEach(ensureDisplaySwap)
          })
        } else {
          document.querySelectorAll('link[href*="fonts.googleapis.com/css"]').forEach(ensureDisplaySwap)
        }
        
        // Watch for dynamically added links (MutationObserver - 2025 best practice)
        if (typeof MutationObserver !== 'undefined') {
          const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
              mutation.addedNodes.forEach(function(node) {
                if (node.nodeName === 'LINK' && node.href) {
                  ensureDisplaySwap(node)
                }
              })
            })
          })
          
          if (document.head) {
            observer.observe(document.head, { childList: true, subtree: true })
          }
        }
      })()
    </script>
    <title>Family Recipes</title>
  </head>
  <body class="bg-background text-foreground overflow-x-hidden">
    <div id="app">
      <!-- Loading state - shown before Vue app is mounted -->
      <div id="app-loading">
        <div id="app-loading-content">
          <div class="app-loading-spinner"></div>
          <div style="font-size: 0.875rem;">Loading Family Recipes...</div>
        </div>
      </div>
      <style>
        #app-loading {
          font-family: sans-serif;
          position: fixed;
          top: 0;
          left: 0;
          right: 0;
          bottom: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background-color: #f8f8f6;
          z-index: 9999;
        }
        @media (prefers-color-scheme: dark) {
          #app-loading {
            background-color: #1a1917;
          }
        }
        #app-loading-content {
          display: flex;
          flex-direction: column;
          align-items: center;
          gap: 1rem;
          color: #a1a1aa;
        }
        .app-loading-spinner {
          width: 48px;
          height: 48px;
          border: 3px solid #a1a1aa;
          border-top-color: #5d2a1a;
          border-radius: 50%;
          animation: spin 0.8s linear infinite;
        }
        @media (prefers-color-scheme: dark) {
          .app-loading-spinner {
            border-color: #2e2c29;
            border-top-color: #fbe1d1;
          }
        }
        @keyframes spin {
          to { transform: rotate(360deg); }
        }
        /* Hide loading state when app is mounted */
        body.app-mounted #app-loading {
          display: none !important;
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
